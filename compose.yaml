services:
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  wallet-db:
    image: postgres:16-alpine
    container_name: wallet-db
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./wallet/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  grafana-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: grafana-lgtm
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4317
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://grafana-lgtm:4318/v1/traces
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://grafana-lgtm:4318/v1/logs
    depends_on:
      auth-db:
        condition: service_healthy
      grafana-lgtm:
        condition: service_started

  wallet-service:
    build:
      context: ./wallet
      dockerfile: Dockerfile
    container_name: wallet-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-db:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      AUTH_SERVICE_URL: http://auth-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8082
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4317
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://grafana-lgtm:4318/v1/traces
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://grafana-lgtm:4318/v1/logs
    depends_on:
      wallet-db:
        condition: service_healthy
      auth-service:
        condition: service_started
      grafana-lgtm:
        condition: service_started

  notification-service:
    build:
      context: ./notification
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-db:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4317
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://grafana-lgtm:4318/v1/logs
    depends_on:
      wallet-db:
        condition: service_healthy
      grafana-lgtm:
        condition: service_started
